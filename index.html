<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://i.pinimg.com/originals/d7/97/ce/d797cef8d1f01392e6b3334f0293a8b1.jpg" class="avatar">
      <div>
        <span class="name">Elisa</span>
        <span class="username">@mihell</span>
      </div>
    </div>

    <p class="post-text">
      Hoje farmei mt aura KKKKK 67
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>

      <button id="dislikeBtn">Descurtir</button>
      <span id="dislikeCount">0</span>

    </div>

    <section class="comments">
      <div class="comment">
        <img src="https://i.pinimg.com/564x/16/b7/40/16b7401a1124a2c8907bed93f7512f2d.jpg" class="avatar-small">
        <p>six seven 🔥</p>
      </div>

      <div class="comment">
        <img src="https://m.media-amazon.com/images/M/MV5BMGI2YTQwMmEtYWMyZC00N2Y2LTg1NGMtNjA3NTRjYjYxYjE5XkEyXkFqcGc@._V1_.jpg" class="avatar-small">
        <p>foda</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
